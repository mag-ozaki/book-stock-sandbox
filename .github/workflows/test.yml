name: テスト

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Docker Compose 用 .env を作成
        run: cp .env.example .env

      - name: Laravel 用 .env を作成
        run: |
          {
            echo 'APP_NAME=Laravel'
            echo 'APP_ENV=local'
            echo 'APP_KEY='
            echo 'APP_DEBUG=true'
            echo 'APP_URL=http://localhost'
            echo 'LOG_CHANNEL=stack'
            echo 'LOG_LEVEL=debug'
            echo 'DB_CONNECTION=pgsql'
            echo 'DB_HOST=db'
            echo 'DB_PORT=5432'
            echo 'DB_DATABASE=book_stock'
            echo 'DB_USERNAME=book_stock'
            echo 'DB_PASSWORD=secret'
            echo 'SESSION_DRIVER=database'
            echo 'QUEUE_CONNECTION=database'
            echo 'CACHE_STORE=database'
            echo 'MAIL_MAILER=log'
            echo 'VITE_APP_NAME=Laravel'
          } > src/.env

      - name: src/ の所有者を appuser（UID 1000）に変更
        run: sudo chown -R 1000:1000 src/

      - name: テスト対象コンテナを起動（nginx は除外）
        run: docker compose up -d --build laravel db db_test

      - name: 依存パッケージをインストール
        run: docker compose exec -T laravel composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: アプリケーションキーを生成
        run: docker compose exec -T laravel php artisan key:generate

      - name: テスト DB にマイグレーション適用
        run: docker compose exec -T laravel php artisan migrate --env=testing --force

      - name: テストを実行
        run: docker compose exec -T laravel php artisan test

      - name: コンテナを停止
        if: always()
        run: docker compose down -v
